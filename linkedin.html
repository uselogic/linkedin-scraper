<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post Scraper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .input-group input {
            flex: 1;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1rem;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .results-box {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 2rem;
        }
        .results-box h3 { margin-bottom: 1rem; color: var(--accent); }
        .download-section { margin-bottom: 1.5rem; }
        .download-section p { margin-bottom: 0.5rem; color: var(--text-main); }
        .text-container {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        #text-content {
            flex: 1;
            width: 100%;
            height: 150px;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            resize: vertical;
        }
        #text-content:focus {
            outline: none;
            border-color: var(--accent);
        }
        .copy-btn {
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .copy-btn:hover {
            background: var(--accent-hover);
        }
        .download-list {
            list-style-type: none;
            padding-left: 0;
            margin-top: 0.5rem;
        }
        .download-list li {
            margin-bottom: 0.5rem;
        }
        .download-link {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: var(--accent);
            text-decoration: none;
            transition: all 0.2s;
        }
        .download-link:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container glass-panel">
        <header>
            <h1>LinkedIn Scraper <span>Pro</span></h1>
            <p>Paste a LinkedIn Post URL and let Playwright bypass the blocks to scrape the text, images, and videos.</p>
            <a href="/" class="back-btn" style="display:inline-block; margin-top:1rem;">← Back to Story Scraper</a>
        </header>

        <main>
            <div class="input-group">
                <input type="text" id="linkedin-url" placeholder="https://www.linkedin.com/posts/..." />
                <button class="scrape-btn" id="scrape-btn" onclick="scrapeLinkedIn()">Scrape Post</button>
            </div>

            <div id="loading-indicator" class="loading hidden">Scraping with Playwright...</div>
            <div id="error-message" class="error hidden"></div>

            <div id="results" class="results-box hidden">
                <h3>Successfully Extracted!</h3>
                
                <!-- Text Section -->
                <div class="download-section">
                    <p><strong>Text Content:</strong></p>
                    <div class="text-container">
                        <textarea id="text-content" readonly></textarea>
                        <button class="copy-btn" onclick="copyText()">Copy Text</button>
                    </div>
                </div>
                
                <!-- Images Section -->
                <div class="download-section" id="images-section">
                    <p><strong>Images:</strong></p>
                    <ul id="res-img" class="download-list"></ul>
                </div>
                
                <!-- Videos Section -->
                <div class="download-section" id="videos-section">
                    <p><strong>Videos:</strong></p>
                    <ul id="res-vid" class="download-list"></ul>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function scrapeLinkedIn() {
            const urlInput = document.getElementById('linkedin-url').value;
            if (!urlInput) {
                alert("Please enter a valid LinkedIn URL");
                return;
            }

            const btn = document.getElementById('scrape-btn');
            const loading = document.getElementById('loading-indicator');
            const errBox = document.getElementById('error-message');
            const resultsBox = document.getElementById('results');

            btn.disabled = true;
            btn.textContent = 'Scraping...';
            loading.classList.remove('hidden');
            errBox.classList.add('hidden');
            resultsBox.classList.add('hidden');

            try {
                const response = await fetch('/api/scrape_linkedin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });
                
                const data = await response.json();
                
                loading.classList.add('hidden');
                btn.disabled = false;
                btn.textContent = 'Scrape Post';

                if (data.success) {
                    // Display text content
                    const textContent = document.getElementById('text-content');
                    textContent.value = data.result.text || 'No text found.';
                    
                    // Clear previous results
                    document.getElementById('res-img').innerHTML = '';
                    document.getElementById('res-vid').innerHTML = '';
                    
                    // Create image download links
                    if (data.result.images && data.result.images.length > 0) {
                        data.result.images.forEach(imgUrl => {
                            const li = document.createElement('li');
                            const a = document.createElement('a');
                            a.href = imgUrl;
                            a.download = imgUrl.split('/').pop();
                            a.textContent = `Download Image (${a.download})`;
                            a.className = 'download-link';
                            li.appendChild(a);
                            document.getElementById('res-img').appendChild(li);
                        });
                        document.getElementById('images-section').style.display = 'block';
                    } else {
                        document.getElementById('images-section').style.display = 'none';
                    }
                    
                    // Create video download links
                    if (data.result.videos && data.result.videos.length > 0) {
                        data.result.videos.forEach(vidUrl => {
                            const li = document.createElement('li');
                            const a = document.createElement('a');
                            a.href = vidUrl;
                            a.download = vidUrl.split('/').pop();
                            a.textContent = `Download Video (${a.download})`;
                            a.className = 'download-link';
                            li.appendChild(a);
                            document.getElementById('res-vid').appendChild(li);
                        });
                        document.getElementById('videos-section').style.display = 'block';
                    } else {
                        document.getElementById('videos-section').style.display = 'none';
                    }
                    
                    resultsBox.classList.remove('hidden');
                } else {
                    errBox.textContent = "Error: " + data.error;
                    errBox.classList.remove('hidden');
                }
            } catch (error) {
                loading.classList.add('hidden');
                btn.disabled = false;
                btn.textContent = 'Scrape Post';
                errBox.textContent = "Failed to communicate with the backend.";
                errBox.classList.remove('hidden');
            }
        }
        
        function copyText() {
            const textarea = document.getElementById('text-content');
            textarea.select();
            document.execCommand('copy');
            alert('Text copied to clipboard!');
        }
    </script>
</body>
</html>
